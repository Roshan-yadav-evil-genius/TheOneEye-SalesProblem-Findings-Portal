{% extends "base.html" %}

{% block title %}The One Eye — Research{% endblock %}

{% block body %}
<div class="landing-wrap">
    <div class="landing-card">
        <div class="landing-header-row">
            <button type="button" class="theme-toggle" id="themeToggleHome" aria-label="Theme: follow system" title="Theme (system)">
                <svg class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <svg class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="theme-toggle__icon theme-toggle__icon--monitor" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </button>
        </div>
        <img src="/static/Logo.png" alt="The One Eye" class="landing-logo" width="120" height="120">
        <p class="landing-tagline">TheOneEye Sales Innovations Research Tracker</p>
        <div class="landing-actions">
            <a class="landing-btn landing-btn--primary" href="/problems">Problems</a>
            <a class="landing-btn landing-btn--outline" href="/innovations">Innovations</a>
        </div>
    </div>
</div>
{% endblock %}

{% block body_scripts %}
<script>
(function () {
    var btn = document.getElementById("themeToggleHome");
    if (!btn || !window.PortalTheme) return;
    var sun = btn.querySelector(".theme-toggle__icon--sun");
    var moon = btn.querySelector(".theme-toggle__icon--moon");
    var monitor = btn.querySelector(".theme-toggle__icon--monitor");
    function labelFor(stored) {
        if (stored === "system") return "Theme: follow system (click for light)";
        if (stored === "light") return "Theme: light (click for dark)";
        return "Theme: dark (click for system)";
    }
    function syncIcons() {
        var stored = window.PortalTheme.getStored();
        var resolved = window.PortalTheme.getResolved();
        btn.setAttribute("aria-label", labelFor(stored));
        btn.setAttribute("title", labelFor(stored));
        if (sun) sun.style.display = "none";
        if (moon) moon.style.display = "none";
        if (monitor) monitor.style.display = "none";
        if (stored === "system" && monitor) monitor.style.display = "block";
        else if (resolved === "light" && moon) moon.style.display = "block";
        else if (sun) sun.style.display = "block";
    }
    btn.addEventListener("click", function () {
        window.PortalTheme.cycle();
        syncIcons();
    });
    document.addEventListener("portalthemechange", syncIcons);
    syncIcons();
})();
</script>
{% endblock %}
