<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The One Eye — Research</title>
    <link rel="icon" type="image/png" href="/static/LogoSquare.png">
    <link rel="apple-touch-icon" href="/static/LogoSquare.png">
    <style>
        :root {
            --primary: #1a202c;
            --secondary: #4a5568;
            --accent: #3182ce;
            --bg: #f0f2f5;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--primary);
            line-height: 1.5;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        }
        .landing {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .landing-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            display: block;
            margin: 0 auto 28px;
        }
        .landing-tagline {
            font-size: 1.05rem;
            color: var(--secondary);
            font-weight: 500;
            margin-bottom: 36px;
            letter-spacing: 0.02em;
        }
        .landing-actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .landing-btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: #fff;
            color: var(--primary);
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            min-height: 52px;
            touch-action: manipulation;
        }
        .landing-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 14px rgba(49, 130, 206, 0.15);
            transform: translateY(-1px);
        }
        .landing-btn:focus {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        .landing-btn--primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .landing-btn--primary:hover {
            background: #2b6cb0;
            border-color: #2b6cb0;
            box-shadow: 0 4px 14px rgba(49, 130, 206, 0.35);
        }
        @media (min-width: 480px) {
            .landing-actions {
                flex-direction: row;
                justify-content: center;
            }
            .landing-btn { width: auto; min-width: 160px; }
        }
    </style>
</head>
<body>
    <div class="landing">
        <img src="/static/Logo.png" alt="The One Eye" class="landing-logo" width="120" height="120">
        <p class="landing-tagline">Research of The One Eye Team</p>
        <div class="landing-actions">
            <a class="landing-btn landing-btn--primary" href="/problems">Problems</a>
            <a class="landing-btn" href="/innovations">Innovations</a>
        </div>
    </div>
</body>
</html>
