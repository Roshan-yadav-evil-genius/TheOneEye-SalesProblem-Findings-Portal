<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Tracker - The One Eye Researchers</title>
    <style>
        :root {
            --primary: #1a202c;
            --secondary: #4a5568;
            --accent: #3182ce;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --raw-color: #718096;
            --done-color: #38a169;
            --review-color: #d69e2e;
            --todo-color: #3182ce;
            --deleted-color: #e53e3e;
            --sidebar-w: 320px;
            --notes-w: 340px;
            --header-h: 56px;
            --tabs-h: 48px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--primary);
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────── */
        .app-header {
            height: var(--header-h);
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
        }
        .app-header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
        .search-box {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            padding: 6px 12px;
            color: #fff;
            font-size: 0.875rem;
            width: 240px;
            outline: none;
            transition: background 0.2s;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus { background: rgba(255,255,255,0.2); }

        /* ── Tabs ────────────────────────────────────── */
        .tabs-bar {
            position: fixed;
            top: var(--header-h);
            left: 0; right: 0;
            height: var(--tabs-h);
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            padding: 0 24px;
            gap: 4px;
            z-index: 99;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--accent); }
        .tab-count {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 10px;
            background: var(--bg);
            color: var(--secondary);
        }
        .tab-btn.active .tab-count { background: var(--accent); color: #fff; }

        /* ── Main 3-panel layout ─────────────────────── */
        .app-body {
            display: flex;
            position: fixed;
            top: calc(var(--header-h) + var(--tabs-h));
            left: 0; right: 0; bottom: 0;
        }

        /* ── Panel 1: problem list ───────────────────── */
        .list-panel {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            border-right: 1px solid var(--border);
            background: #fff;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .list-panel::-webkit-scrollbar { width: 5px; }
        .list-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

        .list-card {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        .list-card:hover { background: #f7fafc; }
        .list-card.selected { background: #ebf4ff; border-left: 3px solid var(--accent); }
        .list-card-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 5px;
            line-height: 1.35;
        }
        .list-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 2px 7px;
            border-radius: 4px;
        }
        .status-badge[data-status="raw"]    { background: #edf2f7; color: var(--raw-color); }
        .status-badge[data-status="done"]   { background: #f0fff4; color: var(--done-color); }
        .status-badge[data-status="review"] { background: #fefcbf; color: var(--review-color); }
        .status-badge[data-status="todo"]   { background: #ebf8ff; color: var(--todo-color); }
        .status-badge[data-status="deleted"] { background: #fff5f5; color: var(--deleted-color); }

        .has-notes-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            flex-shrink: 0;
        }

        .list-empty {
            padding: 48px 20px;
            text-align: center;
            color: var(--secondary);
            font-size: 0.88rem;
        }

        /* ── Panel 2: detail content ─────────────────── */
        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            scrollbar-width: thin;
            border-right: 1px solid var(--border);
        }
        .detail-panel::-webkit-scrollbar { width: 5px; }
        .detail-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }

        .detail-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #a0aec0;
            font-size: 0.95rem;
        }

        .detail-header { margin-bottom: 24px; }
        .detail-title {
            font-family: Georgia, serif;
            font-size: 1.45rem;
            line-height: 1.3;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .status-actions {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }
        .status-btn {
            padding: 5px 14px;
            border-radius: 6px;
            border: 2px solid var(--border);
            background: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .status-btn:hover { transform: translateY(-1px); }
        .status-btn[data-s="raw"]    { border-color: var(--raw-color);    color: var(--raw-color); }
        .status-btn[data-s="done"]   { border-color: var(--done-color);   color: var(--done-color); }
        .status-btn[data-s="review"] { border-color: var(--review-color); color: var(--review-color); }
        .status-btn[data-s="todo"]   { border-color: var(--todo-color);   color: var(--todo-color); }
        .status-btn[data-s="deleted"] { border-color: var(--deleted-color); color: var(--deleted-color); }
        .status-btn.active-status { color: #fff; }
        .status-btn.active-status[data-s="raw"]    { background: var(--raw-color); }
        .status-btn.active-status[data-s="done"]   { background: var(--done-color); }
        .status-btn.active-status[data-s="review"] { background: var(--review-color); }
        .status-btn.active-status[data-s="todo"]   { background: var(--todo-color); }
        .status-btn.active-status[data-s="deleted"] { background: var(--deleted-color); }

        .detail-section { margin-bottom: 20px; }
        .section-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .section-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
        }
        .section-chevron {
            font-size: 0.6rem;
            color: var(--secondary);
            transition: transform 0.2s;
        }
        .section-toggle[aria-expanded="false"] .section-chevron { transform: rotate(-90deg); }
        .section-body {
            color: var(--secondary);
            font-size: 0.9rem;
            line-height: 1.7;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }
        .section-body.collapsed { max-height: 0; opacity: 0; margin-bottom: 0; }

        .why-box {
            background: #f0fff4;
            border-left: 4px solid var(--done-color);
            padding: 12px 14px;
            border-radius: 4px;
            font-style: italic;
        }
        .evidence-box {
            background: #fffaf0;
            border-left: 4px solid var(--review-color);
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        /* ── Panel 3: notes ──────────────────────────── */
        .notes-panel {
            width: var(--notes-w);
            min-width: var(--notes-w);
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .notes-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
        }
        .notes-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--primary);
        }
        .notes-problem-ref {
            font-size: 0.75rem;
            color: var(--secondary);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .notes-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            overflow: hidden;
        }
        .notes-area {
            flex: 1;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .notes-area:focus { border-color: var(--accent); }
        .notes-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
        }
        .notes-save-btn {
            padding: 7px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .notes-save-btn:hover { background: #2b6cb0; }
        .notes-saved-msg {
            font-size: 0.78rem;
            color: var(--done-color);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .notes-saved-msg.show { opacity: 1; }
        .notes-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            font-size: 0.88rem;
            padding: 20px;
            text-align: center;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 1100px) {
            :root { --notes-w: 280px; --sidebar-w: 260px; }
        }
        @media (max-width: 860px) {
            .app-body { flex-direction: column; }
            .list-panel {
                width: 100%;
                min-width: unset;
                max-height: 30vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .detail-panel {
                padding: 16px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 40vh;
            }
            .notes-panel {
                width: 100%;
                min-width: unset;
                flex: 1;
            }
            .search-box { width: 140px; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>TheOneEye Sales Problem Research Tracker</h1>
    <input type="text" class="search-box" id="searchInput" placeholder="Search problems... (Ctrl+K)">
</header>

<nav class="tabs-bar" id="tabsBar">
    <button class="tab-btn active" data-tab="raw">Raw <span class="tab-count" id="count-raw">0</span></button>
    <button class="tab-btn" data-tab="todo">Todo <span class="tab-count" id="count-todo">0</span></button>
    <button class="tab-btn" data-tab="review">Review <span class="tab-count" id="count-review">0</span></button>
    <button class="tab-btn" data-tab="done">Done <span class="tab-count" id="count-done">0</span></button>
    <button class="tab-btn" data-tab="deleted">Deleted <span class="tab-count" id="count-deleted">0</span></button>
</nav>

<div class="app-body">
    <aside class="list-panel" id="listPanel"></aside>

    <main class="detail-panel" id="detailPanel">
        <div class="detail-placeholder">Select a problem from the list to view details</div>
    </main>

    <section class="notes-panel" id="notesPanel">
        <div class="notes-placeholder">Select a problem to start taking notes</div>
    </section>
</div>

<script>
(function () {
    let problems = [];
    let activeTab = 'raw';
    let selectedSlug = null;
    let searchQuery = '';

    const listPanel = document.getElementById('listPanel');
    const detailPanel = document.getElementById('detailPanel');
    const notesPanel = document.getElementById('notesPanel');
    const searchInput = document.getElementById('searchInput');
    const tabsBar = document.getElementById('tabsBar');

    async function loadProblems() {
        const res = await fetch('/api/problems');
        problems = await res.json();
        updateCounts();
        renderList();
        if (selectedSlug) {
            renderDetail(selectedSlug);
            renderNotes(selectedSlug);
        }
    }

    async function setStatus(slug, status) {
        await fetch('/api/status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug, status })
        });
        const p = problems.find(x => x.proposed_slug === slug);
        if (p) p.status = status;
        updateCounts();
        renderList();
        if (selectedSlug === slug) renderDetail(slug);
    }

    async function saveNotes(slug, notes) {
        await fetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug, notes })
        });
        const p = problems.find(x => x.proposed_slug === slug);
        if (p) p.notes = notes;
        renderList();
    }

    function updateCounts() {
        const counts = { raw: 0, done: 0, review: 0, todo: 0, deleted: 0 };
        problems.forEach(p => { counts[p.status] = (counts[p.status] || 0) + 1; });
        Object.keys(counts).forEach(k => {
            document.getElementById('count-' + k).textContent = counts[k];
        });
    }

    function getFiltered() {
        return problems.filter(p => {
            if (p.status !== activeTab) return false;
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                return p.problem_title.toLowerCase().includes(q) ||
                       p.problem_description.toLowerCase().includes(q);
            }
            return true;
        });
    }

    function renderList() {
        const filtered = getFiltered();
        if (!filtered.length) {
            listPanel.innerHTML = '<div class="list-empty">No problems in this category' +
                (searchQuery ? ' matching your search' : '') + '</div>';
            return;
        }
        listPanel.innerHTML = filtered.map(p => `
            <div class="list-card${p.proposed_slug === selectedSlug ? ' selected' : ''}"
                 data-slug="${p.proposed_slug}">
                <div class="list-card-title">${esc(p.problem_title)}</div>
                <div class="list-card-meta">
                    <span class="status-badge" data-status="${p.status}">${p.status}</span>
                    ${p.notes ? '<span class="has-notes-dot" title="Has notes"></span>' : ''}
                </div>
            </div>
        `).join('');
    }

    function renderDetail(slug) {
        const p = problems.find(x => x.proposed_slug === slug);
        if (!p) {
            detailPanel.innerHTML = '<div class="detail-placeholder">Select a problem from the list to view details</div>';
            return;
        }
        selectedSlug = slug;

        detailPanel.innerHTML = `
            <div class="detail-header">
                <h2 class="detail-title">${esc(p.problem_title)}</h2>
                <div class="status-actions">
                    ${['raw','todo','review','done','deleted'].map(s =>
                        `<button class="status-btn${p.status === s ? ' active-status' : ''}" data-s="${s}">${statusLabel(s)}</button>`
                    ).join('')}
                </div>
            </div>

            <div class="detail-section">
                <button class="section-toggle" aria-expanded="true" data-target="sec-desc">
                    <span class="section-label">Problem Description</span>
                    <span class="section-chevron">&#9660;</span>
                </button>
                <div class="section-body" id="sec-desc">${esc(p.problem_description)}</div>
            </div>

            <div class="detail-section">
                <button class="section-toggle" aria-expanded="true" data-target="sec-why">
                    <span class="section-label">Why It Matters</span>
                    <span class="section-chevron">&#9660;</span>
                </button>
                <div class="section-body" id="sec-why"><div class="why-box">${esc(p.why_it_matters)}</div></div>
            </div>

            <div class="detail-section">
                <button class="section-toggle" aria-expanded="true" data-target="sec-ev">
                    <span class="section-label">Evidence</span>
                    <span class="section-chevron">&#9660;</span>
                </button>
                <div class="section-body" id="sec-ev"><div class="evidence-box">${esc(p.example_evidence)}</div></div>
            </div>
        `;
    }

    function renderNotes(slug) {
        const p = problems.find(x => x.proposed_slug === slug);
        if (!p) {
            notesPanel.innerHTML = '<div class="notes-placeholder">Select a problem to start taking notes</div>';
            return;
        }
        notesPanel.innerHTML = `
            <div class="notes-header">
                <div class="notes-title">Your Notes</div>
                <div class="notes-problem-ref">${esc(p.problem_title)}</div>
            </div>
            <div class="notes-body">
                <textarea class="notes-area" id="notesArea" placeholder="Write your thoughts, analysis, or follow-up ideas...">${esc(p.notes || '')}</textarea>
            </div>
            <div class="notes-footer">
                <button class="notes-save-btn" id="saveNotesBtn">Save Notes</button>
                <span class="notes-saved-msg" id="savedMsg">Saved</span>
            </div>
        `;
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function statusLabel(s) {
        return { raw: 'Raw', done: 'Done', review: 'Review', todo: 'Todo', deleted: 'Delete' }[s] || s;
    }

    tabsBar.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        tabsBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        renderList();
    });

    listPanel.addEventListener('click', e => {
        const card = e.target.closest('.list-card');
        if (!card) return;
        selectedSlug = card.dataset.slug;
        renderList();
        renderDetail(selectedSlug);
        renderNotes(selectedSlug);
    });

    detailPanel.addEventListener('click', e => {
        const statusBtn = e.target.closest('.status-btn');
        if (statusBtn && selectedSlug) {
            setStatus(selectedSlug, statusBtn.dataset.s);
            return;
        }
        const toggle = e.target.closest('.section-toggle');
        if (toggle) {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', String(!expanded));
            const body = document.getElementById(toggle.dataset.target);
            if (body) body.classList.toggle('collapsed', expanded);
        }
    });

    notesPanel.addEventListener('click', e => {
        if (e.target.id === 'saveNotesBtn' && selectedSlug) {
            const notes = document.getElementById('notesArea').value;
            saveNotes(selectedSlug, notes).then(() => {
                const msg = document.getElementById('savedMsg');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            });
        }
    });

    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchQuery = searchInput.value.trim();
            renderList();
        }, 200);
    });

    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            searchInput.focus();
        }
    });

    loadProblems();
})();
</script>

</body>
</html>
